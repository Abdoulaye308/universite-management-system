<div class="container mt-4">

  <h2>
    Gestion des utilisateurs
  </h2>

  <!-- ===================== -->
  <!-- FORMULAIRE -->
  <!-- ===================== -->

  <div class="card p-3 mb-4">

    <div class="row">

      <!-- Nom -->
      <div class="col-md-6 mb-3">

        <label>Nom</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="user.nom"
        >

      </div>

      <!-- Prénom -->
      <div class="col-md-6 mb-3">

        <label>Prénom</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="user.prenom"
        >

      </div>

      <!-- Email -->
      <div class="col-md-6 mb-3">

        <label>Email</label>

        <input
          type="email"
          class="form-control"
          [(ngModel)]="user.email"
        >

      </div>

      <!-- Mot de passe -->
      <div class="col-md-6 mb-3">

        <label>Mot de passe</label>

        <input
          type="password"
          class="form-control"
          [(ngModel)]="user.password"
        >

      </div>

      <!-- Rôle -->
      <div class="col-md-6 mb-3">

        <label>Rôle</label>

        <select
          class="form-select"
          [(ngModel)]="user.role"
        >

          <option value="ADMIN">
            ADMIN
          </option>

          <option value="ETUDIANT">
            ETUDIANT
          </option>

          <option value="ENSEIGNANT">
            ENSEIGNANT
          </option>

          <option value="ADMINISTRATIF">
            ADMINISTRATIF
          </option>

        </select>

      </div>

      <!-- Service -->
      <div
        class="col-md-6 mb-3"
        *ngIf="user.role === 'ADMINISTRATIF'"
      >

        <label>Service</label>

        <select
          class="form-select"
          [(ngModel)]="user.service"
        >

          <option value="">
            Choisir un service
          </option>

          <option value="Scolarité">
            Scolarité
          </option>

          <option value="Pédagogie">
            Pédagogie
          </option>

          <option value="Finance">
            Finance
          </option>

          <option value="Informatique">
            Informatique
          </option>

          <option value="Administration">
            Administration
          </option>

          <option value="Ressources Humaines">
            Ressources Humaines
          </option>

          <option value="Stages">
            Stages
          </option>

        </select>

      </div>

    </div>

    <!-- Boutons -->

    <button
      *ngIf="!editMode"
      class="btn btn-primary"
      (click)="addUser()"
    >
      Ajouter
    </button>

    <button
      *ngIf="editMode"
      class="btn btn-warning"
      (click)="updateUser()"
    >
      Modifier
    </button>

  </div>

  <!-- ===================== -->
  <!-- TABLEAU -->
  <!-- ===================== -->

  <table class="table table-bordered table-striped">

    <thead>

      <tr>

        <th>ID</th>

        <th>Nom</th>

        <th>Prénom</th>

        <th>Email</th>

        <th>Rôle</th>

        <th>Service</th>

        <th>Actions</th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let u of users">

        <td>{{ u.id }}</td>

        <td>{{ u.nom }}</td>

        <td>{{ u.prenom }}</td>

        <td>{{ u.email }}</td>

        <td>{{ u.role }}</td>

        <td>

          <span *ngIf="u.service">
            {{ u.service }}
          </span>

          <span *ngIf="!u.service">
            -
          </span>

        </td>

        <td>

          <button
            class="btn btn-warning btn-sm me-2"
            (click)="editUser(u)"
          >
            Modifier
          </button>

          <button
            class="btn btn-danger btn-sm"
            (click)="deleteUser(u.id)"
          >
            Supprimer
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
