<div class="container mt-4">

  <h2>
    Gestion des inscriptions
  </h2>

  <!-- ===================== -->
  <!-- FORMULAIRE -->
  <!-- ===================== -->

  <div class="card p-3 mb-4">

    <div class="row">

      <!-- Étudiant -->
      <div class="col-md-6 mb-3">

        <label>
          Étudiant
        </label>

        <select
          class="form-select"
          [(ngModel)]="inscription.studentId"
        >

          <option
            *ngFor="let s of students"
            [value]="s.id"
          >

            {{ s.nom }}
            {{ s.prenom }}

          </option>

        </select>

      </div>

      <!-- Formation -->
      <div class="col-md-6 mb-3">

        <label>
          Formation
        </label>

        <select
          class="form-select"
          [(ngModel)]="inscription.formationId"
        >

          <option
            *ngFor="let f of formations"
            [value]="f.id"
          >

            {{ f.nom }}

          </option>

        </select>

      </div>

    </div>

    <!-- Bouton -->
    <button
      class="btn btn-primary"
      (click)="addInscription()"
    >
      Inscrire
    </button>

  </div>

  <!-- ===================== -->
  <!-- TABLE -->
  <!-- ===================== -->

  <table class="table table-bordered">

    <thead>

    <tr>

      <th>ID</th>

      <th>Étudiant</th>

      <th>Formation</th>

      <th>Actions</th>

    </tr>

    </thead>

    <tbody>

    <tr
      *ngFor="let i of inscriptions"
    >

      <td>{{ i.id }}</td>

      <td>
        {{ getStudentName(i.studentId) }}
      </td>

      <td>
        {{ getFormationName(i.formationId) }}
      </td>

      <td>

        <button
          class="btn btn-danger btn-sm"
          (click)="deleteInscription(i.id)"
        >
          Supprimer
        </button>

      </td>

    </tr>

    </tbody>

  </table>

</div>
