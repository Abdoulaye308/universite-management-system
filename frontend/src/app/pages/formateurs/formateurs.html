<div class="container mt-4">

  <h2>
    Gestion des formateurs
  </h2>

  <!-- ===================== -->
  <!-- FORMULAIRE -->
  <!-- ===================== -->

  <div class="card p-3 mb-4">

    <div class="row">

      <!-- Nom -->
      <div class="col-md-4 mb-3">

        <label>Nom</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="formateur.nom"
        >
      </div>

      <!-- Prénom -->
      <div class="col-md-4 mb-3">

        <label>Prénom</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="formateur.prenom"
        >
      </div>

      <!-- Email -->
      <div class="col-md-4 mb-3">

        <label>Email</label>

        <input
          type="email"
          class="form-control"
          [(ngModel)]="formateur.email"
        >
      </div>

      <!-- Grade -->
      <div class="col-md-4 mb-3">

        <label>Grade</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="formateur.grade"
        >
      </div>

      <!-- Type -->
      <div class="col-md-4 mb-3">

        <label>Type</label>

        <select
          class="form-select"
          [(ngModel)]="formateur.type"
        >

          <option value="Enseignant">
            Enseignant
          </option>

          <option value="Enseignant associé">
            Enseignant associé
          </option>

          <option value="Tuteur">
            Tuteur
          </option>

          <option value="Responsable formation">
            Responsable formation
          </option>

        </select>
      </div>

      <!-- Spécialité -->
      <div class="col-md-4 mb-3">

        <label>Spécialité</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="formateur.specialite"
        >
      </div>

    </div>

    <!-- Boutons -->

    <button
      *ngIf="!editMode"
      class="btn btn-primary"
      (click)="addFormateur()"
    >
      Ajouter
    </button>

    <button
      *ngIf="editMode"
      class="btn btn-warning"
      (click)="updateFormateur()"
    >
      Modifier
    </button>

  </div>

  <!-- ===================== -->
  <!-- TABLE -->
  <!-- ===================== -->

  <table class="table table-bordered table-striped">

    <thead>

    <tr>

      <th>ID</th>

      <th>Nom</th>

      <th>Prénom</th>

      <th>Email</th>

      <th>Grade</th>

      <th>Type</th>

      <th>Spécialité</th>

      <th>Actions</th>

    </tr>

    </thead>

    <tbody>

    <tr *ngFor="let f of formateurs">

      <td>{{ f.id }}</td>

      <td>{{ f.nom }}</td>

      <td>{{ f.prenom }}</td>

      <td>{{ f.email }}</td>

      <td>{{ f.grade }}</td>

      <td>{{ f.type }}</td>

      <td>{{ f.specialite }}</td>

      <td>

        <button
          class="btn btn-warning btn-sm me-2"
          (click)="editFormateur(f)"
        >
          Modifier
        </button>

        <button
          class="btn btn-danger btn-sm"
          (click)="deleteFormateur(f.id)"
        >
          Supprimer
        </button>

      </td>

    </tr>

    </tbody>

  </table>

</div>
