<div class="container mt-4">

  <h2>
    Gestion des emplois du temps
  </h2>

  <!-- ===================== -->
  <!-- FORMULAIRE -->
  <!-- ===================== -->

  <div class="card p-3 mb-4">

    <div class="row">

      <!-- Formation -->
      <div class="col-md-4 mb-3">

        <label>Formation</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="emploi.formation"
        >
      </div>

      <!-- Jour -->
      <div class="col-md-4 mb-3">

        <label>Jour</label>

        <select
          class="form-select"
          [(ngModel)]="emploi.jour"
        >

          <option>Lundi</option>

          <option>Mardi</option>

          <option>Mercredi</option>

          <option>Jeudi</option>

          <option>Vendredi</option>

          <option>Samedi</option>

        </select>
      </div>

      <!-- Salle -->
      <div class="col-md-4 mb-3">

        <label>Salle</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="emploi.salle"
        >
      </div>

      <!-- Heure début -->
      <div class="col-md-3 mb-3">

        <label>Heure début</label>

        <input
          type="time"
          class="form-control"
          [(ngModel)]="emploi.heureDebut"
        >
      </div>

      <!-- Heure fin -->
      <div class="col-md-3 mb-3">

        <label>Heure fin</label>

        <input
          type="time"
          class="form-control"
          [(ngModel)]="emploi.heureFin"
        >
      </div>

      <!-- Module -->
      <div class="col-md-3 mb-3">

        <label>Module</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="emploi.module"
        >
      </div>

      <!-- Enseignant -->
      <div class="col-md-3 mb-3">

        <label>Enseignant</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="emploi.enseignant"
        >
      </div>

    </div>

    <!-- Boutons -->

    <button
      *ngIf="!editMode"
      class="btn btn-primary"
      (click)="addEmploi()"
    >
      Ajouter
    </button>

    <button
      *ngIf="editMode"
      class="btn btn-warning"
      (click)="updateEmploi()"
    >
      Modifier
    </button>

  </div>

  <!-- ===================== -->
  <!-- TABLE -->
  <!-- ===================== -->

  <table class="table table-bordered table-striped">

    <thead>

    <tr>

      <th>ID</th>

      <th>Formation</th>

      <th>Jour</th>

      <th>Début</th>

      <th>Fin</th>

      <th>Salle</th>

      <th>Module</th>

      <th>Enseignant</th>

      <th>Actions</th>

    </tr>

    </thead>

    <tbody>

    <tr *ngFor="let e of emplois">

      <td>{{ e.id }}</td>

      <td>{{ e.formation }}</td>

      <td>{{ e.jour }}</td>

      <td>{{ e.heureDebut }}</td>

      <td>{{ e.heureFin }}</td>

      <td>{{ e.salle }}</td>

      <td>{{ e.module }}</td>

      <td>{{ e.enseignant }}</td>

      <td>

        <button
          class="btn btn-warning btn-sm me-2"
          (click)="editEmploi(e)"
        >
          Modifier
        </button>

        <button
          class="btn btn-danger btn-sm"
          (click)="deleteEmploi(e.id)"
        >
          Supprimer
        </button>

      </td>

    </tr>

    </tbody>

  </table>

</div>
