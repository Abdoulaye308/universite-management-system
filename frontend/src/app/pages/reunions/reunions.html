<div class="container mt-4">

  <h2>
    Gestion des réunions
  </h2>

  <!-- ===================== -->
  <!-- FORMULAIRE -->
  <!-- ===================== -->

  <div class="card p-3 mb-4">

    <div class="row">

      <!-- TYPE -->
      <div class="col-md-4 mb-3">

        <label>
          Type réunion
        </label>

        <select
          class="form-select"
          [(ngModel)]="reunion.type"
        >

          <option value="Tutorat">
            Tutorat
          </option>

          <option value="Préparation cours">
            Préparation cours
          </option>

          <option value="Préparation évaluations">
            Préparation évaluations
          </option>

        </select>

      </div>

      <!-- SUJET -->
      <div class="col-md-8 mb-3">

        <label>
          Sujet
        </label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="reunion.sujet"
        >

      </div>

      <!-- DATE -->
      <div class="col-md-4 mb-3">

        <label>
          Date
        </label>

        <input
          type="date"
          class="form-control"
          [(ngModel)]="reunion.date"
        >

      </div>

      <!-- HEURE -->
      <div class="col-md-4 mb-3">

        <label>
          Heure
        </label>

        <input
          type="time"
          class="form-control"
          [(ngModel)]="reunion.heure"
        >

      </div>

      <!-- SALLE -->
      <div class="col-md-4 mb-3">

        <label>
          Salle
        </label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="reunion.salle"
        >

      </div>

      <!-- FORMATION -->
      <div class="col-md-6 mb-3">

        <label>
          Formation concernée
        </label>

        <select
          class="form-select"
          [(ngModel)]="reunion.formationId"
          (change)="onFormationChange()"
        >

          <option value="0">
            Choisir une formation
          </option>

          <option
            *ngFor="let formation of formations"
            [value]="formation.id"
          >

            {{ formation.nom }}

          </option>

        </select>

      </div>

      <!-- FORMATEUR -->
      <div class="col-md-6 mb-3">

        <label>
          Formateur concerné
        </label>

        <select
          class="form-select"
          [(ngModel)]="reunion.formateurId"
          (change)="onFormateurChange()"
        >

          <option value="0">
            Choisir un formateur
          </option>

          <option
            *ngFor="let formateur of formateurs"
            [value]="formateur.id"
          >

            {{ formateur.nom }}
            {{ formateur.prenom }}
            -
            {{ formateur.specialite }}

          </option>

        </select>

      </div>
      <!-- SERVICE -->
<div class="col-md-6 mb-3">

  <label>
    Service concerné
  </label>

  <select
    class="form-select"
    [(ngModel)]="reunion.serviceConcerne"
  >

    <option value="">
      Choisir un service
    </option>

    <option value="Scolarité">
      Scolarité
    </option>

    <option value="Pédagogie">
      Pédagogie
    </option>

    <option value="Direction">
      Direction
    </option>

    <option value="Finance">
      Finance
    </option>

  </select>

</div>

      <!-- PARTICIPANTS -->
      <div class="col-md-12 mb-3">

        <label>
          Participants
        </label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="reunion.participants"
        >

      </div>

      <!-- COMPTE RENDU -->
      <div class="col-md-12 mb-3">

        <label>
          Compte rendu
        </label>

        <textarea
          rows="5"
          class="form-control"
          [(ngModel)]="reunion.compteRendu"
        ></textarea>

      </div>

    </div>

    <!-- BOUTONS -->

    <button
      *ngIf="!editMode"
      class="btn btn-primary"
      (click)="addReunion()"
    >
      Ajouter
    </button>

    <button
      *ngIf="editMode"
      class="btn btn-warning"
      (click)="updateReunion()"
    >
      Modifier
    </button>

  </div>

  <!-- ===================== -->
  <!-- TABLE -->
  <!-- ===================== -->

  <table
    class="table table-bordered table-striped"
  >

    <thead>

      <tr>

        <th>ID</th>

        <th>Type</th>

        <th>Sujet</th>

        <th>Formation</th>

        <th>Formateur</th>

        <th>Date</th>

        <th>Heure</th>

        <th>Salle</th>

        <th>Participants</th>

        <th>Compte rendu</th>

        <th>Actions</th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let r of reunions">

        <td>{{ r.id }}</td>

        <td>{{ r.type }}</td>

        <td>{{ r.sujet }}</td>

        <td>{{ r.formationNom }}</td>

        <td>{{ r.formateurNom }}</td>

        <td>{{ r.date }}</td>

        <td>{{ r.heure }}</td>

        <td>{{ r.salle }}</td>

        <td>{{ r.participants }}</td>

        <!-- COMPTE RENDU -->
        <td>

          <div
            style="
              max-width: 250px;
              max-height: 120px;
              overflow: auto;
              white-space: pre-wrap;
            "
          >

            {{ r.compteRendu }}

          </div>

        </td>

        <!-- ACTIONS -->
        <td>

          <!-- MODIFIER -->
          <button
            class="btn btn-warning btn-sm me-2"
            (click)="editReunion(r)"
          >
            Modifier
          </button>

          <!-- DELETE -->
          <button
            class="btn btn-danger btn-sm"
            (click)="deleteReunion(r.id)"
          >
            Supprimer
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
