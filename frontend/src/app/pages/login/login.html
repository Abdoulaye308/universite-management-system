<div class="login-shell">

  <div class="login-left">
    <div class="brand">
      <span class="brand-mark">U</span>
      <span class="brand-name">UNCHK</span>
    </div>
    <h1 class="login-tagline">Plateforme de gestion universitaire</h1>
    <p class="login-sub">Accédez à votre espace personnel — étudiants, formateurs et administration.</p>
  </div>

  <div class="login-right">
    <div class="login-card">

      <h2 class="card-title">Connexion</h2>
      <p class="card-sub">Entrez vos identifiants pour continuer</p>

      <form (ngSubmit)="onLogin()">

        <div class="field">
          <label class="field-label">Email</label>
          <input
            type="email"
            class="field-input"
            [(ngModel)]="email"
            name="email"
            placeholder="exemple@unchk.edu.sn"
            required
          >
        </div>

        <div class="field">
          <label class="field-label">Mot de passe</label>
          <input
            type="password"
            class="field-input"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
          >
        </div>

        <button type="submit" class="login-btn">
          Se connecter
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </form>

    </div>
  </div>

</div>
