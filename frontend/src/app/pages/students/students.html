<div class="container mt-4">

  <h2 class="mb-4">
    Gestion des Étudiants
  </h2>

  <!-- FORMULAIRE -->
  <div class="card shadow p-4 mb-4">

  <h4 class="mb-3">
    Ajouter un étudiant
  </h4>

  <form
  (ngSubmit)="
    editMode
    ? updateStudent()
    : addStudent()
  "
>

    <div class="row">

      <!-- INE -->
      <div class="col-md-4 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="INE"
          [(ngModel)]="student.ine"
          name="ine"
          required
        >

      </div>

      <!-- Nom -->
      <div class="col-md-4 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Nom"
          [(ngModel)]="student.nom"
          name="nom"
          required
        >

      </div>

      <!-- Prénom -->
      <div class="col-md-4 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Prénom"
          [(ngModel)]="student.prenom"
          name="prenom"
          required
        >

      </div>

      <!-- Date naissance -->
      <div class="col-md-4 mb-3">

        <input
          type="date"
          class="form-control"
          [(ngModel)]="student.dateNaissance"
          name="dateNaissance"
          required
        >

      </div>

      <!-- Formation -->
      <div class="col-md-4 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Formation"
          [(ngModel)]="student.formation"
          name="formation"
          required
        >

      </div>

      <!-- Promo -->
      <div class="col-md-4 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Promotion"
          [(ngModel)]="student.promo"
          name="promo"
          required
        >

      </div>

      <!-- Année début -->
      <div class="col-md-3 mb-3">

        <input
          type="number"
          class="form-control"
          placeholder="Année début"
          [(ngModel)]="student.anneeDebut"
          name="anneeDebut"
          required
        >

      </div>

      <!-- Année sortie -->
      <div class="col-md-3 mb-3">

        <input
          type="number"
          class="form-control"
          placeholder="Année sortie"
          [(ngModel)]="student.anneeSortie"
          name="anneeSortie"
          required
        >

      </div>

      <!-- Diplôme -->
      <div class="col-md-3 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Diplôme"
          [(ngModel)]="student.diplome"
          name="diplome"
          required
        >

      </div>

      <!-- Autres formations -->
      <div class="col-md-3 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Autres formations"
          [(ngModel)]="student.autresFormations"
          name="autresFormations"
        >

      </div>

    </div>

    <!-- BUTTON -->
    <button
      type="submit"
      class="btn btn-primary"
    >
      {{ editMode ? 'Modifier' : 'Ajouter' }}
    </button>

  </form>

</div>

  <!-- TABLE -->
  <div class="card shadow p-4">

    <h4 class="mb-3">
      Liste des étudiants
    </h4>

    <table class="table table-hover">

  <thead>

  <tr>

    <th>ID</th>

    <th>INE</th>

    <th>Nom</th>

    <th>Prénom</th>

    <th>Formation</th>

    <th>Promo</th>

    <th>Diplôme</th>

    <th>Actions</th>

  </tr>

  </thead>

  <tbody>

  <tr *ngFor="let s of students">

    <td>{{ s.id }}</td>

    <td>{{ s.ine }}</td>

    <td>{{ s.nom }}</td>

    <td>{{ s.prenom }}</td>

    <td>{{ s.formation }}</td>

    <td>{{ s.promo }}</td>

    <td>{{ s.diplome }}</td>

    <td>

  <!-- Modifier -->
  <button
    class="btn btn-warning btn-sm me-2"
    (click)="editStudent(s)"
  >
    Modifier
  </button>

  <!-- Supprimer -->
  <button
    class="btn btn-danger btn-sm"
    (click)="deleteStudent(s.id)"
  >
    Supprimer
  </button>

</td>

  </tr>

  </tbody>

</table>

  </div>

</div>
